name: Angular Build Test

on:
push:
branches:
- main

jobs:
build:
runs-on: ubuntu-latest

```
steps:
  - uses: actions/checkout@v4

  - uses: actions/setup-node@v4
    with:
      node-version: 18

  - name: Install Dependencies
    run: npm install

  - name: Show Angular Version
    run: npm list @angular/cli

  - name: Build
    run: npm run build
```
